          - "*"

  # ---------------------------------------------------------------------------
  # NuGet – keep the sample .NET Core application dependencies current.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "nuget"
    directory: "/samples/dotnet-core"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "dotnet"
    open-pull-requests-limit: 5
    groups:
      dotnet-dependencies:
        patterns:
          - "*"

  # ---------------------------------------------------------------------------
  # Composer – keep the sample PHP application dependencies current.
  # ---------------------------------------------------------------------------
