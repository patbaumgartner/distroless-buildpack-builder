version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/stack/build"
    schedule:
      interval: "daily"
      time: "01:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5
    groups:
      build-stack-images:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/stack/run"
    schedule:
      interval: "daily"
      time: "01:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 5
    groups:
      run-stack-images:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/samples/nodejs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "npm"
    open-pull-requests-limit: 5
    groups:
      nodejs-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/samples/go"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "go"
    open-pull-requests-limit: 5
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "maven"
    directory: "/samples/java"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "java"
    open-pull-requests-limit: 5
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
      maven-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "org.springframework.boot:*"

  - package-ecosystem: "maven"
    directory: "/samples/java-native-image"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "java"
    open-pull-requests-limit: 5
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
      maven-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "org.springframework.boot:*"

  - package-ecosystem: "pip"
    directory: "/samples/python"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "bundler"
    directory: "/samples/ruby"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "ruby"
    open-pull-requests-limit: 5
    groups:
      ruby-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/samples/dotnet-core"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "dotnet"
    open-pull-requests-limit: 5
    groups:
      dotnet-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "composer"
    directory: "/samples/php"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "php"
    open-pull-requests-limit: 5
    groups:
      php-dependencies:
        patterns:
          - "*"
