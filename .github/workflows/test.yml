name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Allow manual triggering for on-demand integration test runs.
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/patbaumgartner/distroless-buildpack-builder
  # Local tag used for the builder image created during CI (avoids GHCR pull).
  BUILDER_LOCAL_TAG: distroless-builder:ci

jobs:
  # -------------------------------------------------------------------------
  # Smoke tests: build stack images locally and validate CNB labels.
  # Fast check that does not require pack or buildpack downloads.
  # -------------------------------------------------------------------------
  smoke-tests:
    name: Smoke tests – stack image labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build build stack image (local)
        uses: docker/build-push-action@v7
        with:
          context: ./stack/build
          load: true
          tags: ${{ env.IMAGE_BASE }}/build:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build run stack image (local)
        uses: docker/build-push-action@v7
        with:
          context: ./stack/run
          load: true
          tags: ${{ env.IMAGE_BASE }}/run:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate stack image labels
        run: bash tests/smoke/smoke_test.sh
        env:
          BUILD_IMAGE: ${{ env.IMAGE_BASE }}/build:test
          RUN_IMAGE: ${{ env.IMAGE_BASE }}/run:test

  # -------------------------------------------------------------------------
  # Integration tests: build stack images + builder locally, then build and
  # run each sample application.  Runs after smoke tests pass.
  # -------------------------------------------------------------------------
  integration-tests:
    name: Integration – build and run samples
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.11.0

      - name: Set up Java (for mvn spring-boot:build-image)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Log in to GHCR (read-only, for pulling Paketo buildpacks)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (for pulling Paketo buildpack images)
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        # If credentials are not configured, anonymous pulls are used.
        # Anonymous Docker Hub pulls are rate-limited to 100/6h per IP which
        # is usually sufficient for a single CI run.
        continue-on-error: true

      # Build stack images and tag them with the canonical "latest" names that
      # builder.toml references, so pack builder create uses local images.
      - name: Build build stack image (local, canonical tag)
        uses: docker/build-push-action@v7
        with:
          context: ./stack/build
          load: true
          tags: ${{ env.IMAGE_BASE }}/build:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build run stack image (local, canonical tag)
        uses: docker/build-push-action@v7
        with:
          context: ./stack/run
          load: true
          tags: ${{ env.IMAGE_BASE }}/run:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Create the builder from the locally-tagged stack images.
      # --pull-policy if-not-present ensures local images are used instead of
      # pulling from GHCR (which has no image yet on PR branches).
      - name: Create builder locally
        run: |
          pack builder create "${{ env.BUILDER_LOCAL_TAG }}" \
            --config builder.toml \
            --pull-policy if-not-present

      # ----- Node.js --------------------------------------------------------
      - name: Build Node.js sample with pack
        run: |
          pack build distroless-test/nodejs:ci \
            --path ./samples/nodejs \
            --builder "${{ env.BUILDER_LOCAL_TAG }}" \
            --trust-builder \
            --pull-policy if-not-present

      - name: Run Node.js container and verify response
        run: |
          docker run -d --name nodejs-test -p 8080:8080 distroless-test/nodejs:ci
          sleep 5
          docker logs nodejs-test || true
          RESP=$(curl -sf http://localhost:8080/ || echo "FAILED")
          echo "Response: ${RESP}"
          echo "${RESP}" | grep -qi "hello"
          docker rm -f nodejs-test

      # ----- Go -------------------------------------------------------------
      - name: Build Go sample with pack
        run: |
          pack build distroless-test/go:ci \
            --path ./samples/go \
            --builder "${{ env.BUILDER_LOCAL_TAG }}" \
            --trust-builder \
            --pull-policy if-not-present

      - name: Run Go container and verify response
        run: |
          docker run -d --name go-test -p 8081:8080 distroless-test/go:ci
          sleep 5
          RESP=$(curl -sf http://localhost:8081/ || echo "FAILED")
          echo "Response: ${RESP}"
          echo "${RESP}" | grep -qi "hello"
          docker rm -f go-test

      # ----- Python ----------------------------------------------------------
      - name: Build Python sample with pack
        run: |
          pack build distroless-test/python:ci \
            --path ./samples/python \
            --builder "${{ env.BUILDER_LOCAL_TAG }}" \
            --trust-builder \
            --pull-policy if-not-present

      - name: Run Python container and verify response
        run: |
          docker run -d --name python-test -p 8085:8080 distroless-test/python:ci
          sleep 10
          docker logs python-test 2>&1 || true
          RESP=$(curl -sf http://localhost:8085/ || echo "FAILED")
          echo "Response: ${RESP}"
          echo "${RESP}" | grep -qi "hello"
          docker rm -f python-test

      # ----- Ruby ------------------------------------------------------------
      - name: Build Ruby sample with pack
        run: |
          pack build distroless-test/ruby:ci \
            --path ./samples/ruby \
            --builder "${{ env.BUILDER_LOCAL_TAG }}" \
            --trust-builder \
            --pull-policy if-not-present

      - name: Run Ruby container and verify response
        run: |
          docker run -d --name ruby-test -p 8086:8080 distroless-test/ruby:ci
          sleep 10
          docker logs ruby-test 2>&1 || true
          RESP=$(curl -sf http://localhost:8086/ || echo "FAILED")
          echo "Response: ${RESP}"
          echo "${RESP}" | grep -qi "hello"
          docker rm -f ruby-test

      # ----- .NET Core -------------------------------------------------------
      - name: Build .NET Core sample with pack
        run: |
          pack build distroless-test/dotnet-core:ci \
            --path ./samples/dotnet-core \
            --builder "${{ env.BUILDER_LOCAL_TAG }}" \
            --trust-builder \
            --pull-policy if-not-present

      - name: Run .NET Core container and verify response
        run: |
          docker run -d --name dotnet-test -p 8087:8080 distroless-test/dotnet-core:ci
          sleep 10
          docker logs dotnet-test 2>&1 || true
          RESP=$(curl -sf http://localhost:8087/ || echo "FAILED")
          echo "Response: ${RESP}"
          echo "${RESP}" | grep -qi "hello"
          docker rm -f dotnet-test

      # ----- PHP -------------------------------------------------------------
      - name: Build PHP sample with pack
        run: |
          pack build distroless-test/php:ci \
            --path ./samples/php \
            --builder "${{ env.BUILDER_LOCAL_TAG }}" \
            --trust-builder \
            --pull-policy if-not-present

      - name: Run PHP container and verify response
        run: |
          docker run -d --name php-test -p 8088:8080 distroless-test/php:ci
          sleep 10
          docker logs php-test 2>&1 || true
          RESP=$(curl -sf http://localhost:8088/ || echo "FAILED")
          echo "Response: ${RESP}"
          echo "${RESP}" | grep -qi "hello"
          docker rm -f php-test

      # ----- Web Servers (Nginx static) --------------------------------------
      - name: Build Web Servers sample with pack
        run: |
          pack build distroless-test/web-servers:ci \
            --path ./samples/web-servers \
            --builder "${{ env.BUILDER_LOCAL_TAG }}" \
            --trust-builder \
            --pull-policy if-not-present

      - name: Run Web Servers container and verify response
        run: |
          docker run -d --name web-test -p 8089:8080 distroless-test/web-servers:ci
          sleep 10
          docker logs web-test 2>&1 || true
          RESP=$(curl -sf http://localhost:8089/ || echo "FAILED")
          echo "Response: ${RESP}"
          echo "${RESP}" | grep -qi "hello"
          docker rm -f web-test

      # ----- Java (pack build) -----------------------------------------------
      - name: Build Java sample with pack
        run: |
          pack build distroless-test/java:ci \
            --path ./samples/java \
            --builder "${{ env.BUILDER_LOCAL_TAG }}" \
            --trust-builder \
            --pull-policy if-not-present

      - name: Run Java container and verify response
        run: |
          docker run -d --name java-test -p 8082:8080 distroless-test/java:ci
          for i in $(seq 1 30); do
            RESP=$(curl -sf http://localhost:8082/ 2>/dev/null || echo "")
            if echo "${RESP}" | grep -qi "hello"; then
              echo "Java app responded: ${RESP}"
              break
            fi
            echo "Waiting... (${i}/30)"
            sleep 3
          done
          echo "${RESP}" | grep -qi "hello"
          docker rm -f java-test

      # ----- Java (mvn spring-boot:build-image) ----------------------------
      # ----- Java Native Image (pack build) ---------------------------------
      - name: Build Java Native Image sample with pack
        run: |
          pack build distroless-test/java-native-image:ci \
            --path ./samples/java-native-image \
            --builder "${{ env.BUILDER_LOCAL_TAG }}" \
            --trust-builder \
            --pull-policy if-not-present

      - name: Run Java Native Image container and verify response
        run: |
          docker run -d --name java-native-test -p 8084:8080 distroless-test/java-native-image:ci
          for i in $(seq 1 30); do
            RESP=$(curl -sf http://localhost:8084/ 2>/dev/null || echo "")
            if echo "${RESP}" | grep -qi "hello"; then
              echo "Java Native Image app responded: ${RESP}"
              break
            fi
            echo "Waiting... (${i}/30)"
            sleep 3
          done
          echo "${RESP}" | grep -qi "hello"
          docker rm -f java-native-test

      # ----- Java (mvn spring-boot:build-image) ----------------------------
      - name: Build Spring Boot sample via mvn spring-boot:build-image
        working-directory: ./samples/java
        run: |
          mvn spring-boot:build-image \
            --no-transfer-progress \
            -Dspring-boot.build-image.builder="${{ env.BUILDER_LOCAL_TAG }}" \
            -Dspring-boot.build-image.imageName=distroless-test/java-mvn:ci \
            -Dspring-boot.build-image.pullPolicy=IF_NOT_PRESENT

      - name: Run Spring Boot (mvn-built) container and verify response
        run: |
          docker run -d --name java-mvn-test -p 8083:8080 distroless-test/java-mvn:ci
          for i in $(seq 1 30); do
            RESP=$(curl -sf http://localhost:8083/ 2>/dev/null || echo "")
            if echo "${RESP}" | grep -qi "hello"; then
              echo "Spring Boot (mvn) app responded: ${RESP}"
              break
            fi
            echo "Waiting... (${i}/30)"
            sleep 3
          done
          echo "${RESP}" | grep -qi "hello"
          docker rm -f java-mvn-test

