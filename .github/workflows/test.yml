name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Allow manual triggering for on-demand integration test runs.
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/patbaumgartner/distroless-buildpack-builder

jobs:
  # -------------------------------------------------------------------------
  # Build the stack images locally for the test run (avoids registry push
  # dependency on PR branches where push is disabled).
  # -------------------------------------------------------------------------
  build-stack-local:
    name: Build stack images (local)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build build stack image (local)
        uses: docker/build-push-action@v6
        with:
          context: ./stack/build
          load: true
          tags: ${{ env.IMAGE_BASE }}/build:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build run stack image (local)
        uses: docker/build-push-action@v6
        with:
          context: ./stack/run
          load: true
          tags: ${{ env.IMAGE_BASE }}/run:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate stack image labels
        run: |
          bash tests/smoke/smoke_test.sh
        env:
          REGISTRY: ${{ env.IMAGE_BASE }}
          BUILD_IMAGE: ${{ env.IMAGE_BASE }}/build:test
          RUN_IMAGE: ${{ env.IMAGE_BASE }}/run:test

  # -------------------------------------------------------------------------
  # Build and test Node.js sample application
  # -------------------------------------------------------------------------
  test-nodejs:
    name: Integration – Node.js sample
    runs-on: ubuntu-latest
    needs: build-stack-local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.7.4

      - name: Log in to GHCR (read-only for base images)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Node.js sample with pack
        run: |
          pack build distroless-test/nodejs:ci \
            --path ./samples/nodejs \
            --builder "${{ env.IMAGE_BASE }}:latest" \
            --trust-builder \
            --pull-policy if-not-present

      - name: Run Node.js container and verify response
        run: |
          docker run -d --name nodejs-test -p 8080:8080 distroless-test/nodejs:ci
          sleep 5
          RESP=$(curl -sf http://localhost:8080/ || echo "FAILED")
          echo "Response: ${RESP}"
          echo "${RESP}" | grep -qi "hello"
          docker rm -f nodejs-test

  # -------------------------------------------------------------------------
  # Build and test Go sample application
  # -------------------------------------------------------------------------
  test-go:
    name: Integration – Go sample
    runs-on: ubuntu-latest
    needs: build-stack-local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.7.4

      - name: Log in to GHCR (read-only for base images)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Go sample with pack
        run: |
          pack build distroless-test/go:ci \
            --path ./samples/go \
            --builder "${{ env.IMAGE_BASE }}:latest" \
            --trust-builder \
            --pull-policy if-not-present

      - name: Run Go container and verify response
        run: |
          docker run -d --name go-test -p 8080:8080 distroless-test/go:ci
          sleep 5
          RESP=$(curl -sf http://localhost:8080/ || echo "FAILED")
          echo "Response: ${RESP}"
          echo "${RESP}" | grep -qi "hello"
          docker rm -f go-test

  # -------------------------------------------------------------------------
  # Build and test Java sample application
  # -------------------------------------------------------------------------
  test-java:
    name: Integration – Java sample
    runs-on: ubuntu-latest
    needs: build-stack-local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.7.4

      - name: Log in to GHCR (read-only for base images)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Java sample with pack
        run: |
          pack build distroless-test/java:ci \
            --path ./samples/java \
            --builder "${{ env.IMAGE_BASE }}:latest" \
            --trust-builder \
            --pull-policy if-not-present

      - name: Run Java container and verify response
        run: |
          docker run -d --name java-test -p 8080:8080 distroless-test/java:ci
          for i in $(seq 1 30); do
            RESP=$(curl -sf http://localhost:8080/ 2>/dev/null || echo "")
            if echo "${RESP}" | grep -qi "hello"; then
              echo "Java app responded: ${RESP}"
              break
            fi
            echo "Waiting... (${i}/30)"
            sleep 3
          done
          echo "${RESP}" | grep -qi "hello"
          docker rm -f java-test
