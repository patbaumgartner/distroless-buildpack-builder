name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Weekly scheduled scan to catch newly disclosed CVEs.
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  # -------------------------------------------------------------------------
  # Scan Dockerfiles with Hadolint (Dockerfile best practices)
  # -------------------------------------------------------------------------
  hadolint:
    name: Hadolint – Dockerfile lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run hadolint on build Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: stack/build/Dockerfile
          format: sarif
          output-file: hadolint-build.sarif
          no-fail: true

      - name: Run hadolint on run Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: stack/run/Dockerfile
          format: sarif
          output-file: hadolint-run.sarif
          no-fail: true

      - name: Upload hadolint SARIF (build image)
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: hadolint-build.sarif
          category: hadolint-build

      - name: Upload hadolint SARIF (run image)
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: hadolint-run.sarif
          category: hadolint-run

  # -------------------------------------------------------------------------
  # Trivy – vulnerability scan of the stack images
  # -------------------------------------------------------------------------
  trivy-build-image:
    name: Trivy – scan build stack image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build build stack image (local for scanning)
        uses: docker/build-push-action@v7
        with:
          context: ./stack/build
          load: true
          tags: distroless-builder/build:scan

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/v0.69.3/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin v0.69.3

      - name: Run Trivy vulnerability scan – build image
        run: |
          trivy image \
            --format sarif \
            --output trivy-build.sarif \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            distroless-builder/build:scan

      - name: Upload Trivy SARIF – build image
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-build.sarif
          category: trivy-build

  trivy-run-image:
    name: Trivy – scan run stack image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build run stack image (local for scanning)
        uses: docker/build-push-action@v7
        with:
          context: ./stack/run
          load: true
          tags: distroless-builder/run:scan

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/v0.69.3/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin v0.69.3

      - name: Run Trivy vulnerability scan – run image
        run: |
          trivy image \
            --format sarif \
            --output trivy-run.sarif \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            distroless-builder/run:scan

      - name: Upload Trivy SARIF – run image
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-run.sarif
          category: trivy-run

  # -------------------------------------------------------------------------
  # Trivy – filesystem / IaC scan (builder.toml, Dockerfiles, workflows)
  # -------------------------------------------------------------------------
  trivy-fs:
    name: Trivy – filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/v0.69.3/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin v0.69.3

      - name: Run Trivy filesystem scan
        run: |
          trivy fs \
            --format sarif \
            --output trivy-fs.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --exit-code 0 \
            .

      - name: Upload Trivy SARIF – filesystem
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

# NOTE: OSSF Scorecard has been moved to its own dedicated workflow
# (.github/workflows/scorecard.yml) because the Scorecard API rejects results
# when any job in the same workflow has write permissions – even at the job
# level. The scorecard workflow must stand alone with only read-level
# top-level permissions.
#
# NOTE: CodeQL static analysis is handled by the repository's Default Setup
# (configured in Settings → Code Security → Code scanning). Running an
# advanced-setup workflow alongside Default Setup is not supported and will
# cause "CodeQL analyses from advanced configurations cannot be processed
# when the default setup is enabled" errors. Remove or disable Default
# Setup in the repository settings if you need a custom CodeQL workflow.
