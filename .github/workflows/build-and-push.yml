name: Build and Push

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  REGISTRY_OWNER: patbaumgartner
  IMAGE_BASE: ghcr.io/patbaumgartner/distroless-buildpack-builder
  DOCKERHUB_IMAGE_BASE: patbaumgartner/distroless-buildpack-builder

jobs:
  # -------------------------------------------------------------------------
  # Build the Ubuntu Noble build-phase stack image
  # -------------------------------------------------------------------------
  build-stack-build:
    name: Build stack – build image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_BASE }}/build
            ${{ env.DOCKERHUB_IMAGE_BASE }}-build
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push build stack image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./stack/build
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Attest build stack image (GHCR)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE_BASE }}/build
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # -------------------------------------------------------------------------
  # Build the Distroless run-phase stack image
  # -------------------------------------------------------------------------
  build-stack-run:
    name: Build stack – run image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_BASE }}/run
            ${{ env.DOCKERHUB_IMAGE_BASE }}-run
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push run stack image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./stack/run
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Attest run stack image (GHCR)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE_BASE }}/run
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # -------------------------------------------------------------------------
  # Assemble the CNB builder image using pack and push to GHCR + Docker Hub
  # -------------------------------------------------------------------------
  build-builder:
    name: Build builder image
    runs-on: ubuntu-latest
    needs:
      - build-stack-build
      - build-stack-run
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.11.0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine builder tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and publish builder to GHCR
        run: |
          pack builder create "${{ env.IMAGE_BASE }}:${{ steps.tag.outputs.tag }}" \
            --config ./builder.toml \
            --publish

      - name: Push builder to Docker Hub
        run: |
          docker pull "${{ env.IMAGE_BASE }}:${{ steps.tag.outputs.tag }}"
          docker tag "${{ env.IMAGE_BASE }}:${{ steps.tag.outputs.tag }}" "${{ env.DOCKERHUB_IMAGE_BASE }}:${{ steps.tag.outputs.tag }}"
          docker push "${{ env.DOCKERHUB_IMAGE_BASE }}:${{ steps.tag.outputs.tag }}"

  # -------------------------------------------------------------------------
  # Delete old package versions from GHCR – keep only the latest 3
  # -------------------------------------------------------------------------
  cleanup-packages:
    name: Cleanup old package versions
    runs-on: ubuntu-latest
    needs: [build-builder]
    if: github.event_name != 'pull_request'
    permissions:
      packages: write

    steps:
      - name: Delete old versions – builder image
        uses: actions/delete-package-versions@v5
        with:
          package-name: distroless-buildpack-builder
          package-type: container
          min-versions-to-keep: 3
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old versions – build stack image
        uses: actions/delete-package-versions@v5
        with:
          package-name: distroless-buildpack-builder/build
          package-type: container
          min-versions-to-keep: 3
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old versions – run stack image
        uses: actions/delete-package-versions@v5
        with:
          package-name: distroless-buildpack-builder/run
          package-type: container
          min-versions-to-keep: 3
          token: ${{ secrets.GITHUB_TOKEN }}
