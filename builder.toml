description = "A Cloud Native Buildpack builder using Google Distroless run images with buildpacks for .NET, Go, Java, Java Native Image, Node.js, PHP, Procfile, Python, Ruby, and Web Servers."

[stack]
  id            = "io.buildpacks.stacks.jammy"
  build-image   = "ghcr.io/patbaumgartner/distroless-buildpack-builder/build:latest"
  run-image     = "ghcr.io/patbaumgartner/distroless-buildpack-builder/run:latest"

[lifecycle]
  version = "0.21.7"

# Buildpacks embedded into this builder image

[[buildpacks]]
  uri = "docker://paketobuildpacks/dotnet-core:4.2.3"

[[buildpacks]]
  uri = "docker://paketobuildpacks/go:4.19.7"

[[buildpacks]]
  uri = "docker://paketobuildpacks/java-native-image:14.3.0"

[[buildpacks]]
  uri = "docker://paketobuildpacks/java:21.4.0"

[[buildpacks]]
  uri = "docker://paketobuildpacks/nodejs:10.2.3"

[[buildpacks]]
  uri = "docker://paketobuildpacks/php:2.19.9"

[[buildpacks]]
  uri = "docker://paketobuildpacks/procfile:5.13.1"

[[buildpacks]]
  uri = "docker://paketobuildpacks/python:2.44.3"

[[buildpacks]]
  uri = "docker://paketobuildpacks/ruby:1.1.4"

[[buildpacks]]
  uri = "docker://paketobuildpacks/web-servers:4.2.3"

# Detection order – most specific language runtimes first; procfile last as a
# universal fallback for apps that declare their start command via a Procfile.

[[order]]
  [[order.group]]
    id      = "paketo-buildpacks/ruby"
    version = "1.1.4"

[[order]]
  [[order.group]]
    id      = "paketo-buildpacks/dotnet-core"
    version = "4.2.3"

[[order]]
  [[order.group]]
    id      = "paketo-buildpacks/go"
    version = "4.19.7"

[[order]]
  [[order.group]]
    id      = "paketo-buildpacks/python"
    version = "2.44.3"

[[order]]
  [[order.group]]
    id      = "paketo-buildpacks/php"
    version = "2.19.9"

[[order]]
  [[order.group]]
    id      = "paketo-buildpacks/web-servers"
    version = "4.2.3"

[[order]]
  [[order.group]]
    id      = "paketo-buildpacks/java-native-image"
    version = "14.3.0"

[[order]]
  [[order.group]]
    id      = "paketo-buildpacks/java"
    version = "21.4.0"

[[order]]
  [[order.group]]
    id      = "paketo-buildpacks/nodejs"
    version = "10.2.3"

[[order]]
  [[order.group]]
    id      = "paketo-buildpacks/procfile"
    version = "5.13.1"
